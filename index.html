<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="only light">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cube Solve">
  <title>Cube Solve</title>
  <link rel="icon" href="data:,">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
  <style>
    :root {
      color-scheme: only light;
      --bg: #000;
      --fg: #f7f7f4;
      --muted: rgba(255, 255, 255, 0.58);
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(10, 10, 10, 0.96);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body,
    #root {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: var(--fg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Noto Sans KR", sans-serif;
      forced-color-adjust: none;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .stage {
      position: absolute;
      inset: 0;
      touch-action: none;
      cursor: grab;
    }

    .stage:active {
      cursor: grabbing;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      position: absolute;
      left: 50%;
      bottom: max(34px, calc(env(safe-area-inset-bottom) + 24px));
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      gap: 12px;
      width: min(312px, calc(100vw - 44px));
      pointer-events: auto;
    }

    .menu-button {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      right: 14px;
      z-index: 6;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(10, 10, 10, 0.46);
      color: rgba(255, 255, 255, 0.72);
      font-size: 24px;
      line-height: 1;
      backdrop-filter: blur(14px);
    }

    .language-select {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      z-index: 6;
      height: 42px;
      padding: 0 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(10, 10, 10, 0.46);
      color: rgba(255, 255, 255, 0.76);
      font-size: 12px;
      font-weight: 800;
      outline: none;
      backdrop-filter: blur(14px);
    }

    .menu-button:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .action {
      flex: 1;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(18, 18, 18, 0.74);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 18px 48px rgba(0, 0, 0, 0.42);
      letter-spacing: 0;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(18px);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .action:active {
      transform: translateY(1px) scale(0.99);
      border-color: rgba(255, 255, 255, 0.34);
      background: rgba(32, 32, 32, 0.8);
    }

    .settings {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #000;
    }

    .settings-panel {
      width: min(520px, 100%);
      max-height: calc(100dvh - 48px);
      overflow: auto;
      padding: 24px 20px 20px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.7);
    }

    .settings h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1;
      font-weight: 650;
      letter-spacing: 0;
      text-align: center;
    }

    .colors {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 18px;
    }

    .color-choice {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.84);
    }

    .color-choice.palette {
      justify-content: center;
      padding: 0;
    }

    .color-choice.selected {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
      background-color: var(--cube-color, #fff) !important;
      opacity: 1 !important;
      filter: none !important;
      mix-blend-mode: normal;
      forced-color-adjust: none;
      color-scheme: only light;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .face-net {
      width: min(246px, 76vw);
      margin: 0 auto 18px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 54px);
      gap: 6px;
    }

    .face-slot {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.045);
      box-shadow: inset 0 0 0 5px rgba(0, 0, 0, 0.5);
      color: rgba(0, 0, 0, 0.76);
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.24);
    }

    .face-slot.active {
      border-color: rgba(255, 255, 255, 0.76);
      box-shadow: inset 0 0 0 5px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.28);
    }

    .face-slot[data-face="top"] {
      grid-column: 2;
      grid-row: 1;
    }

    .face-slot[data-face="left"] {
      grid-column: 1;
      grid-row: 2;
    }

    .face-slot[data-face="front"] {
      grid-column: 2;
      grid-row: 2;
    }

    .face-slot[data-face="right"] {
      grid-column: 3;
      grid-row: 2;
    }

    .face-slot[data-face="back"] {
      grid-column: 4;
      grid-row: 2;
    }

    .face-slot[data-face="bottom"] {
      grid-column: 2;
      grid-row: 3;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0 14px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 13px;
      font-weight: 650;
    }

    .delay-input {
      width: 86px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      outline: none;
    }

    .delay-input option {
      background: #050505;
      color: #fff;
    }

    .delay-input:focus {
      border-color: rgba(255, 255, 255, 0.48);
    }

    .speed-control {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 54px;
      align-items: center;
      gap: 10px;
      margin: -4px 0 16px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 12px;
      font-weight: 700;
    }

    .speed-control input {
      width: 100%;
      accent-color: #fff;
    }

    .speed-value {
      color: #fff;
      text-align: right;
    }

    .formula-screen {
      position: absolute;
      inset: 0;
      z-index: 11;
      overflow: auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
      background: #000;
    }

    .formula-header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 0 16px;
      background: linear-gradient(#000 72%, rgba(0, 0, 0, 0));
    }

    .formula-header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .formula-list {
      display: grid;
      gap: 12px;
      max-width: 680px;
      margin: 0 auto;
    }

    .prediction-section {
      max-width: 680px;
      margin: 0 auto 16px;
      padding: 14px 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
    }

    .prediction-section h2 {
      margin: 0 0 12px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 15px;
      letter-spacing: 0;
    }

    .prediction-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 9px;
      align-items: start;
    }

    .prediction-item {
      display: grid;
      gap: 6px;
      justify-items: center;
      min-width: 0;
      color: rgba(255, 255, 255, 0.58);
      font-size: 10px;
      font-weight: 800;
    }

    .prediction-cube-wrap {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      perspective: 420px;
    }

    .prediction-cube-wrap.editor {
      width: min(230px, 70vw);
      height: 210px;
      margin: 0 auto;
      perspective: 760px;
    }

    .prediction-cube {
      position: relative;
      width: 48px;
      height: 48px;
      transform-style: preserve-3d;
      transform: rotateX(-26deg) rotateY(-34deg);
    }

    .prediction-cube.reveal-spin {
      animation: predictionReveal var(--reveal-duration, 3.8s) cubic-bezier(0.16, 0.72, 0.18, 1) both;
    }

    @keyframes predictionReveal {
      0% { transform: rotateX(-26deg) rotateY(-34deg) scale(1); }
      12% { transform: rotateX(-26deg) rotateY(56deg) scale(0.98); }
      24% { transform: rotateX(64deg) rotateY(56deg) scale(0.96); }
      36% { transform: rotateX(64deg) rotateY(146deg) scale(0.95); }
      48% { transform: rotateX(154deg) rotateY(146deg) scale(0.95); }
      60% { transform: rotateX(154deg) rotateY(236deg) scale(0.96); }
      72% { transform: rotateX(244deg) rotateY(236deg) scale(0.97); }
      84% { transform: rotateX(244deg) rotateY(326deg) scale(0.98); }
      100% { transform: rotateX(-26deg) rotateY(-34deg) scale(1); }
    }

    .prediction-cube.large {
      width: 142px;
      height: 142px;
    }

    .prediction-face {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 2px;
      padding: 2px;
      background: #060606;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .prediction-cube.large .prediction-face {
      gap: 5px;
      padding: 5px;
    }

    .prediction-face[data-face="front"] {
      transform: translateZ(24px);
    }

    .prediction-face[data-face="left"] {
      transform: rotateY(-90deg) translateZ(24px);
    }

    .prediction-face[data-face="top"] {
      transform: rotateX(90deg) translateZ(24px);
    }

    .prediction-cube.large .prediction-face[data-face="front"] {
      transform: translateZ(71px);
    }

    .prediction-cube.large .prediction-face[data-face="left"] {
      transform: rotateY(-90deg) translateZ(71px);
    }

    .prediction-cube.large .prediction-face[data-face="top"] {
      transform: rotateX(90deg) translateZ(71px);
    }

    .prediction-sticker {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      border-radius: 2px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.34);
      forced-color-adjust: none;
      color-scheme: only light;
      background-color: var(--cube-color, #ffffff) !important;
      opacity: 1 !important;
      filter: none !important;
      mix-blend-mode: normal;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .prediction-cube.large .prediction-sticker {
      border-radius: 5px;
      cursor: pointer;
    }

    .prediction-sticker.active {
      outline: 2px solid rgba(255, 255, 255, 0.9);
      outline-offset: -2px;
    }

    .prediction-tools {
      margin: 2px 0 14px;
    }

    .prediction-selector {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .prediction-tab {
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: rgba(255, 255, 255, 0.76);
      font-size: 12px;
      font-weight: 800;
    }

    .prediction-tab.active {
      border-color: rgba(255, 255, 255, 0.54);
      background: rgba(255, 255, 255, 0.13);
      color: #fff;
    }

    .formula-card {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
    }

    .formula-art {
      position: relative;
      height: 104px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
      padding: 7px;
      border-radius: 7px;
      background: #050505;
      transform: skewY(-8deg);
    }

    .mini-sticker {
      border-radius: 4px;
      background-color: var(--cube-color, #ffffff) !important;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.28);
      forced-color-adjust: none;
      color-scheme: only light;
      opacity: 1 !important;
      filter: none !important;
      mix-blend-mode: normal;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .arrow-mark {
      position: absolute;
      right: -8px;
      top: 34px;
      width: 42px;
      height: 42px;
      border-top: 3px solid rgba(255, 255, 255, 0.86);
      border-right: 3px solid rgba(255, 255, 255, 0.86);
      transform: rotate(45deg);
    }

    .formula-copy h2 {
      margin: 0 0 6px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .notation {
      display: inline-flex;
      margin-bottom: 7px;
      padding: 5px 8px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      font-size: 13px;
      font-weight: 800;
    }

    .formula-copy p {
      margin: 0;
      color: rgba(255, 255, 255, 0.62);
      font-size: 12px;
      line-height: 1.45;
    }

    .scan-screen {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      background: #000;
      color: #fff;
      overflow: auto;
    }

    .scan-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .scan-header h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .scan-view {
      position: relative;
      width: min(100%, 520px);
      aspect-ratio: 1;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      overflow: hidden;
      background: #080808;
    }

    .scan-view video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .scan-guide {
      position: absolute;
      inset: 13%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      border: 2px solid rgba(255, 255, 255, 0.86);
      box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.34);
      pointer-events: none;
    }

    .scan-guide span {
      border: 1px solid rgba(255, 255, 255, 0.54);
    }

    .scan-copy {
      max-width: 520px;
      margin: 0 auto;
      color: rgba(255, 255, 255, 0.72);
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
    }

    .scan-preview {
      display: grid;
      grid-template-columns: repeat(3, 34px);
      gap: 4px;
      justify-content: center;
    }

    .scan-preview span {
      width: 34px;
      height: 34px;
      border-radius: 5px;
      background-color: var(--cube-color, #fff) !important;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.38);
      forced-color-adjust: none;
      color-scheme: only light;
    }

    .scan-summary {
      max-width: 520px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }

    .scan-count {
      min-height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 11px;
      font-weight: 800;
    }

    .toggle {
      width: 58px;
      height: 32px;
      padding: 3px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .toggle::before {
      content: "";
      display: block;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.72);
      transition: transform 160ms ease, background 160ms ease;
    }

    .toggle.on {
      background: rgba(24, 168, 91, 0.86);
      border-color: rgba(92, 255, 170, 0.78);
      box-shadow: 0 0 18px rgba(24, 168, 91, 0.34);
    }

    .toggle.on::before {
      transform: translateX(26px);
      background: #fff;
    }

    .pattern-board {
      height: 300px;
      display: grid;
      place-items: center;
      margin: -4px 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.08), transparent 58%);
      perspective: 760px;
      overflow: hidden;
      touch-action: none;
    }

    .pattern-cube {
      position: relative;
      width: 174px;
      height: 174px;
      transform-style: preserve-3d;
    }

    .paint-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 5px;
      padding: 5px;
      background: #070707;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.04);
    }

    .paint-face[data-face="front"] {
      transform: translateZ(87px);
    }

    .paint-face[data-face="back"] {
      transform: rotateY(180deg) translateZ(87px);
    }

    .paint-face[data-face="right"] {
      transform: rotateY(90deg) translateZ(87px);
    }

    .paint-face[data-face="left"] {
      transform: rotateY(-90deg) translateZ(87px);
    }

    .paint-face[data-face="top"] {
      transform: rotateX(90deg) translateZ(87px);
    }

    .paint-face[data-face="bottom"] {
      transform: rotateX(-90deg) translateZ(87px);
    }

    .sticker-cell {
      appearance: none;
      -webkit-appearance: none;
      forced-color-adjust: none;
      color-scheme: only light;
      border: 0;
      border-radius: 5px;
      opacity: 1;
      filter: none;
      background-color: var(--cube-color, #ffffff) !important;
      mix-blend-mode: normal;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.36);
    }

    .sticker-cell.active {
      outline: 2px solid rgba(255, 255, 255, 0.92);
      outline-offset: -2px;
    }

    .settings-actions {
      display: flex;
      gap: 10px;
    }

    .settings-actions .action {
      height: 46px;
      background: rgba(20, 20, 20, 0.92);
    }

    .hint {
      min-height: 18px;
      margin: -8px 0 14px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 520px) {
      .controls {
        bottom: max(28px, calc(env(safe-area-inset-bottom) + 20px));
      }

      .action {
        height: 46px;
      }

      .settings {
        padding: 12px;
      }

      .pattern-board {
        height: 280px;
      }

      .formula-card {
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 12px;
        padding: 12px;
      }

      .formula-art {
        height: 96px;
      }

      .prediction-row {
        gap: 6px;
      }

      .prediction-cube-wrap {
        width: 52px;
        height: 52px;
      }

      .prediction-cube {
        width: 44px;
        height: 44px;
      }

      .prediction-face[data-face="front"] {
        transform: translateZ(22px);
      }

      .prediction-face[data-face="left"] {

      patterns[number].forEach((index) => {

      if (number >= 4) cube["0,1,0"][0] = "Yellow";

      function rgbToHsv(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        const d = max - min;
        let h = 0;
        if (d) {
          if (max === r) h = ((g - b) / d) % 6;
          else if (max === g) h = (b - r) / d + 2;
          else h = (r - g) / d + 4;
          h *= 60;
          if (h < 0) h += 360;
        }
        return { h, s: max ? d / max : 0, v: max };
      }

      function classifyColor(r, g, b) {
        const { h, s, v } = rgbToHsv(r, g, b);
        if (v > 0.72 && s < 0.24) return "White";
        if (h >= 42 && h < 78) return "Yellow";
        if (h >= 12 && h < 42) return "Orange";
        if (h < 12 || h >= 342) return "Red";
        if (h >= 78 && h < 170) return "Green";
        return "Blue";
      }

      function captureScanFace() {
        const video = videoRef.current;
        const canvas = scanCanvasRef.current;
        if (!video || !canvas || !video.videoWidth) return;
        const size = Math.min(video.videoWidth, video.videoHeight) * 0.74;
        const startX = (video.videoWidth - size) / 2;
        const startY = (video.videoHeight - size) / 2;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const colors = [];
        for (let row = 0; row < 3; row += 1) {
          for (let col = 0; col < 3; col += 1) {
            const cx = Math.round(startX + size * (col + 0.5) / 3);
            const cy = Math.round(startY + size * (row + 0.5) / 3);
            const sample = Math.max(10, Math.round(size / 18));
            const data = context.getImageData(cx - sample / 2, cy - sample / 2, sample, sample).data;
            let r = 0, g = 0, b = 0, count = 0;
            for (let i = 0; i < data.length; i += 4) {
              r += data[i]; g += data[i + 1]; b += data[i + 2]; count += 1;
            }
            colors.push(classifyColor(r / count, g / count, b / count));
          }
        }
        setScanPreview(colors);
      }

        });
        return counts;
